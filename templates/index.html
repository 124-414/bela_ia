<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bela IA</title>

<style>
body{
font-family:Arial;
background:#2f3136;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#container{
width:420px;
background:#1e1f22;
display:flex;
flex-direction:column;
border-radius:10px;
overflow:hidden;
}

#chat{
flex:1;
padding:10px;
overflow:auto;
height:500px;
}

.user{color:#4fc3f7;margin:5px 0;}
.bot{color:#a5d6a7;margin:5px 0;}

#box{
display:flex;
padding:10px;
}

#input{
flex:1;
padding:8px;
}

button{
padding:8px 12px;
margin-left:5px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="container">

<div id="chat"></div>

<div id="box">
<input id="input" placeholder="Digite...">
<button id="mic">🎤</button>
<button id="send">Enviar</button>
</div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
