<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Bela IA</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

header {
    background: #020617;
    padding: 15px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    border-bottom: 1px solid #1e293b;
}

#chat {
    height: 75vh;
    overflow-y: auto;
    padding: 20px;
}

.msg {
    margin-bottom: 15px;
    max-width: 80%;
    padding: 10px;
    border-radius: 10px;
}

.user {
    background: #1e40af;
    align-self: flex-end;
    margin-left: auto;
}

.bot {
    background: #1e293b;
}

footer {
    display: flex;
    padding: 10px;
    background: #020617;
    border-top: 1px solid #1e293b;
}

input {
    flex: 1;
    padding: 12px;
    border: none;
    outline: none;
    font-size: 16px;
    border-radius: 5px;
}

button {
    margin-left: 10px;
    padding: 12px 20px;
    border: none;
    background: #22c55e;
    color: white;
    font-weight: bold;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: #16a34a;
}

.loading {
    color: #facc15;
}
</style>
</head>

<body>

<header>🤖 Bela IA</header>

<div id="chat"></div>

<footer>
<input id="input" placeholder="Digite sua mensagem...">
<button onclick="send()">Enviar</button>
</footer>

<script>
async function send() {
    const input = document.getElementById("input");
    const chat = document.getElementById("chat");

    const message = input.value.trim();
    if (!message) return;

    chat.innerHTML += `<div class="msg user"><b>Você:</b> ${message}</div>`;
    input.value = "";

    // loading
    const loadingId = Date.now();
    chat.innerHTML += `<div id="${loadingId}" class="msg bot loading">Bela está digitando...</div>`;
    chat.scrollTop = chat.scrollHeight;

    try {
        const response = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message})
        });

        const data = await response.json();

        document.getElementById(loadingId).remove();

        chat.innerHTML += `<div class="msg bot"><b>Bela:</b> ${data.response}</div>`;
        chat.scrollTop = chat.scrollHeight;

    } catch (error) {
        document.getElementById(loadingId).innerText = "Erro ao conectar com o servidor.";
    }
}

// ENTER
document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") send();
});
</script>

</body>
</html>
