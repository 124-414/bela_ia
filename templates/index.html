<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bela IA</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #ffffff; color: #333; }
        header { background: #ffffff; padding: 20px; text-align: center; font-size: 24px; font-weight: bold; color: #0047ab; border-bottom: 2px solid #0047ab; }
        #chat { height: 75vh; overflow-y: auto; padding: 20px; background: #f4f7f9; display: flex; flex-direction: column; }
        .msg { position: relative; margin-bottom: 20px; padding: 15px; border-radius: 12px; line-height: 1.5; max-width: 85%; border: 1px solid #e0e0e0; word-wrap: break-word; }
        
        /* ACRESCIMO: white-space: pre-wrap faz o navegador respeitar as quebras de linha (\n) */
        .user { background: #0047ab; color: white; align-self: flex-end; border-bottom-right-radius: 2px; white-space: pre-wrap; }
        
        .bot { background: white; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; padding-top: 45px; }
        .copy-btn { position: absolute; top: 10px; right: 10px; background: #f0f0f0; border: 1px solid #ccc; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 11px; font-weight: bold; color: #555; }
        .copy-btn:hover { background: #0047ab; color: white; }
        footer { display: flex; padding: 15px; background: white; border-top: 1px solid #eee; gap: 10px; }
        input { flex: 1; padding: 15px; border: 1px solid #ccc; border-radius: 30px; outline: none; font-size: 16px; }
        #send-btn { background: #0047ab; color: white; border: none; padding: 0 25px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .loading { color: #888; font-style: italic; }
    </style>
</head>
<body>
<header>BELA</header>
<div id="chat"></div>
<footer>
    <input id="input" type="text" placeholder="Escreva sua mensagem..." autocomplete="off">
    <button id="send-btn">ENVIAR</button>
</footer>
<script>
    const input = document.getElementById("input");
    const chat = document.getElementById("chat");
    const btnEnviar = document.getElementById("send-btn");

    async function send() {
        const rawMessage = input.value.trim();
        if (!rawMessage) return;

        // ACRESCIMO: Esta linha procura pontuação grudada e insere uma quebra de linha (\n)
        const message = rawMessage.replace(/([?.!])\s*/g, "$1\n");

        chat.innerHTML += `<div class="msg user"><b>Você:</b><br>${message}</div>`;
        input.value = "";
        chat.scrollTop = chat.scrollHeight;

        const tempId = "msg-" + Date.now();
        chat.innerHTML += `<div id="${tempId}" class="msg bot loading">Bela está analisando...</div>`;
        chat.scrollTop = chat.scrollHeight;

        try {
            const response = await fetch("/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({message: message})
            });
            const data = await response.json();
            const botMsg = document.getElementById(tempId);
            botMsg.classList.remove("loading");
            botMsg.innerHTML = `
                <button class="copy-btn" onclick="copyText(this)">COPIAR</button>
                <b>Bela:</b> <div class="txt-content" style="white-space: pre-wrap; margin-top:8px;">${data.response}</div>
            `;
        } catch (err) {
            const botMsg = document.getElementById(tempId);
            if (botMsg) botMsg.innerText = "Erro na conexão.";
        }
        chat.scrollTop = chat.scrollHeight;
    }

    function copyText(btn) {
        const text = btn.parentElement.querySelector('.txt-content').innerText;
        const textArea = document.createElement("textarea");
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
        btn.innerText = "COPIADO!";
        setTimeout(() => { btn.innerText = "COPIAR"; }, 2000);
    }

    btnEnviar.onclick = send;
    input.onkeydown = (e) => { if (e.key === "Enter") { e.preventDefault(); send(); } };
</script>
</body>
</html>
