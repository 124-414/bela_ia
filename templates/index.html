
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bela IA</title>

    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: auto;
            padding: 20px;
        }

        #chat {
            border: 1px solid #ccc;
            height: 400px;
            overflow-y: auto;
            padding: 10px;
        }

        input {
            width: 75%;
            padding: 10px;
        }

        button {
            padding: 10px;
        }
    </style>
</head>
<body>

<h2>💬 Bela IA</h2>

<div id="chat"></div>

<br>

<input id="input" type="text" placeholder="Digite sua mensagem...">
<button onclick="send()">Enviar</button>

<script>
async function send() {
    const input = document.getElementById("input");
    const chat = document.getElementById("chat");

    const message = input.value.trim();
    if (!message) return;

    chat.innerHTML += "<p><b>Você:</b> " + message + "</p>";
    input.value = "";

    // loading
    const loading = document.createElement("p");
    loading.innerHTML = "<b>Bela:</b> digitando...";
    chat.appendChild(loading);
    chat.scrollTop = chat.scrollHeight;

    try {
        const response = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message: message})
        });

        const data = await response.json();

        loading.remove();

        chat.innerHTML += "<p><b>Bela:</b> " + data.response + "</p>";
        chat.scrollTop = chat.scrollHeight;

    } catch (error) {
        loading.remove();
        chat.innerHTML += "<p style='color:red;'>Erro ao conectar</p>";
    }
}

// ENTER FUNCIONANDO
document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        send();
    }
});
</script>

</body>
</html>
