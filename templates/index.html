<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Bela IA</title>

<style>

body{
background:#2f3136;
font-family:Arial;
color:white;
}

#chat{
height:70vh;
overflow:auto;
padding:20px;
}

.user{
color:#4fc3f7;
margin:10px 0;
}

.ai{
color:#a5d6a7;
margin:10px 0;
}

#box{
display:flex;
padding:10px;
background:#1e1f22;
}

#input{
flex:1;
padding:10px;
font-size:16px;
}

button{
padding:10px;
background:#00c853;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div id="chat"></div>

<div id="box">

<input id="input" placeholder="Pergunte algo">

<button onclick="send()">Enviar</button>

</div>

<script>

async function send(){

let input=document.getElementById("input")

let msg=input.value

if(msg=="") return

let chat=document.getElementById("chat")

chat.innerHTML+=`<div class="user">Você: ${msg}</div>`

input.value=""

let res=await fetch("/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:msg
})

})

let data=await res.json()

chat.innerHTML+=`<div class="ai">Bela: ${data.response}</div>`

chat.scrollTop=chat.scrollHeight

}

</script>

</body>
</html>
