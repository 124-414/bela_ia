<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bela IA</title>

<style>
body{
margin:0;
font-family:Arial;
background:#2f3136;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#container{
width:420px;
max-width:100%;
height:90vh;
background:#1e1f22;
display:flex;
flex-direction:column;
border-radius:10px;
overflow:hidden;
}

/* CHAT */
#chat{
flex:1;
padding:10px;
overflow-y:auto;
display:flex;
flex-direction:column;
}

/* MENSAGENS */
.user{
margin:5px 0;
padding:10px;
border-radius:12px;
max-width:80%;
background:#4fc3f7;
color:black;
align-self:flex-end;
word-wrap:break-word;
}

.bot{
margin:5px 0;
padding:10px;
border-radius:12px;
max-width:80%;
background:#3a3b3f;
color:#a5d6a7;
align-self:flex-start;
word-wrap:break-word;
}

/* INPUT */
#box{
display:flex;
padding:10px;
background:#1e1f22;
border-top:1px solid #444;
}

#input{
flex:1;
padding:10px;
border-radius:20px;
border:none;
outline:none;
}

/* BOTÕES */
button{
padding:10px;
margin-left:5px;
cursor:pointer;
border:none;
border-radius:20px;
background:#5865f2;
color:white;
}

/* MOBILE */
@media(max-width:600px){
#container{
width:100%;
height:100vh;
border-radius:0;
}

.user, .bot{
max-width:95%;
}
}
</style>
</head>

<body>

<div id="container">

    <!-- 🔥 CHAT LIMPO (SEM MENSAGEM INICIAL) -->
    <div id="chat"></div>

    <!-- INPUT -->
    <div id="box">
        <input id="input" placeholder="Digite sua mensagem..." />
        <button id="send">Enviar</button>
    </div>

</div>

<!-- 🔥 USA APENAS SCRIPT EXTERNO -->
<script src="/static/script.js"></script>

</body>
</html>
