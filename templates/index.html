<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bela AI | Interface Avançada</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script> <style>
        :root {
            --bg-color: #131314;
            --text-color: #e3e3e3;
            --accent-blue: #4285f4;
            --input-bg: #1e1f20;
            --user-msg-bg: #2b2c2f;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 850px;
            margin: 0 auto;
        }

        header {
            padding: 15px 20px;
            font-weight: 600;
            color: var(--accent-blue);
            border-bottom: 1px solid #333;
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            max-width: 90%;
            line-height: 1.6;
            font-size: 0.95rem;
            word-wrap: break-word;
        }

        .user-message {
            align-self: flex-end;
            background: var(--user-msg-bg);
            padding: 10px 18px;
            border-radius: 18px 18px 4px 18px;
        }

        .ai-message {
            align-self: flex-start;
            display: flex;
            gap: 12px;
        }

        .ai-icon {
            width: 28px; height: 28px;
            background: linear-gradient(45deg, #4285f4, #9b72cb);
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 5px;
        }

        /* Efeito de Loading */
        #typing-indicator {
            display: none;
            font-style: italic;
            font-size: 0.85rem;
            color: #888;
            margin-left: 40px;
            margin-bottom: 10px;
        }

        .dots { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: #888; margin-left: 2px; animation: blink 1.4s infinite both; }
        .dots:nth-child(2) { animation-delay: 0.2s; }
        .dots:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0% { opacity: .2; } 20% { opacity: 1; } 100% { opacity: .2; } }

        /* Input area */
        .input-area { padding: 20px; }
        .input-wrapper {
            background: var(--input-bg);
            border-radius: 25px;
            padding: 5px 15px;
            display: flex;
            align-items: center;
        }

        input {
            flex: 1; background: transparent; border: none; color: white;
            padding: 12px; font-size: 1rem; outline: none;
        }

        button {
            background: none; border: none; cursor: pointer;
            color: var(--accent-blue); font-weight: 600;
        }

        /* Estilização do Markdown (Listas e Negrito) */
        .text ul { margin: 5px 0; padding-left: 20px; }
        .text strong { color: #fff; }
    </style>
</head>
<body>

    <div class="chat-container">
        <header>Bela AI • 2026</header>
        
        <div id="chat-window">
            <div class="ai-message">
                <div class="ai-icon"></div>
                <div class="text">Olá! Estou pronta para pesquisar qualquer coisa para você.</div>
            </div>
        </div>

        <div id="typing-indicator">Bela está pesquisando na web<span class="dots"></span><span class="dots"></span><span class="dots"></span></div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Pergunte sobre política, clima ou horários..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">Enviar</button>
            </div>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatWindow = document.getElementById('chat-window');
            const indicator = document.getElementById('typing-indicator');
            const message = input.value.trim();

            if (!message) return;

            // Mostra mensagem do usuário
            chatWindow.innerHTML += `<div class="message user-message">${message}</div>`;
            input.value = '';
            chatWindow.scrollTop = chatWindow.scrollHeight;

            // Mostra indicador de carregamento
            indicator.style.display = 'block';

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();

                indicator.style.display = 'none';

                // Renderiza a resposta com Markdown (marked.parse)
                chatWindow.innerHTML += `
                    <div class="ai-message">
                        <div class="ai-icon"></div>
                        <div class="text">${marked.parse(data.response)}</div>
                    </div>`;
                chatWindow.scrollTop = chatWindow.scrollHeight;
            } catch (error) {
                indicator.style.display = 'none';
                console.error('Erro:', error);
            }
        }

        function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }
    </script>
</body>
</html>
