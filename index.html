<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Bela IA</title>

<style>

body{
margin:0;
font-family:Arial;
background:#e5ddd5;
display:flex;
justify-content:center;
}

#container{
width:100%;
max-width:420px;
height:100vh;
display:flex;
flex-direction:column;
background:#e5ddd5;
border-left:1px solid #ccc;
border-right:1px solid #ccc;
}

#header{
background:#075e54;
color:white;
padding:14px;
font-size:18px;
}

#messages{
flex:1;
overflow-y:auto;
padding:10px;
}

.msg{
max-width:75%;
padding:10px;
margin:6px;
border-radius:10px;
word-wrap:break-word;
}

.user{
background:#dcf8c6;
margin-left:auto;
}

.bot{
background:white;
}

#inputArea{
display:flex;
padding:8px;
background:#f0f0f0;
}

#input{
flex:1;
padding:10px;
font-size:16px;
border-radius:20px;
border:1px solid #ccc;
outline:none;
}

button{
margin-left:6px;
padding:10px 14px;
border:none;
border-radius:20px;
background:#25d366;
color:white;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="container">

<div id="header">
🤖 Bela IA
</div>

<div id="messages"></div>

<div id="inputArea">

<input id="input" placeholder="Digite uma mensagem">

<button onclick="enviar()">Enviar</button>

</div>

</div>

<script>

const messages = document.getElementById("messages")
const input = document.getElementById("input")

function enviar(){

const texto = input.value.trim()

if(!texto) return

messages.innerHTML += `<div class="msg user">${texto}</div>`

messages.scrollTop = messages.scrollHeight

input.value=""

fetch("/perguntar",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:texto})
})
.then(r=>r.json())
.then(data=>{

messages.innerHTML += `<div class="msg bot">${data.resposta}</div>`

messages.scrollTop = messages.scrollHeight

})

}

/* ENTER ENVIA MENSAGEM */

input.addEventListener("keypress",function(e){

if(e.key === "Enter"){
enviar()
}

})

</script>

</body>
</html>
